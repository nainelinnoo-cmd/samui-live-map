<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koh Samui Live Map</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #111; }
        header { background: #1a252f; color: #00ebff; padding: 15px; text-align: center; font-size: 1.1rem; font-weight: bold; z-index: 1000; }
        #map { flex: 1; width: 100%; z-index: 1; }
        
        #chat-box { position: absolute; bottom: 20px; left: 10px; width: 220px; height: 180px; background: #1a252f; color: white; z-index: 1000; border-radius: 8px; display: flex; flex-direction: column; padding: 5px; opacity: 0.9; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 5px; font-size: 0.75rem; border-bottom: 1px solid #444; margin-bottom: 5px; }
        #chat-messages div { margin-bottom: 4px; word-wrap: break-word; }
        #chat-input { display: flex; gap: 5px; }
        #chat-input input { flex: 1; border-radius: 3px; border: none; padding: 4px; font-size: 0.75rem; }
        #chat-input button { padding: 4px 8px; background: #00ebff; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }

        @keyframes markerBlink {
            0% { background-color: #ffffff; box-shadow: 0 0 10px #e74c3c; transform: scale(1); }
            50% { background-color: #ffcccc; box-shadow: 0 0 25px #e74c3c, 0 0 15px #e74c3c; transform: scale(1.15); }
            100% { background-color: #ffffff; box-shadow: 0 0 10px #e74c3c; transform: scale(1); }
        }

        .blink-inside { width: 36px; height: 36px; border: 3px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; background-color: #ffffff; animation: markerBlink 1s infinite ease-in-out; }

        /* My Location Blue Dot Style */
        .blue-dot {
            width: 16px; height: 16px;
            background-color: #4285F4;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(0,0,0,0.4);
        }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center; z-index: 99999; padding: 20px; }
        .modal-box { background: white; width: 100%; max-width: 340px; border-radius: 12px; padding: 20px; text-align: center; }
        .modal-box input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; margin-bottom: 15px; }
        .btn-submit { flex: 2; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-cancel { flex: 1; padding: 12px; background: #95a5a6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .delete-btn { padding: 6px 12px; background: #7f8c8d; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 8px; }
        .report-now-btn { margin-top: 8px; padding: 6px 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <header>🚨 Koh Samui Live Map</header>
    <div id="map"></div>

    <div id="chat-box">
        <div id="chat-messages"></div>
        <div id="chat-input">
            <input type="text" id="chatMsg" placeholder="စာရေးရန်..." autocomplete="off">
            <button onclick="sendChat()">ပို့</button>
        </div>
    </div>

    <div class="modal-overlay" id="reportModal">
        <div class="modal-box">
            <h3>🚨 အခြေအနေ ရေးပေးပါ</h3>
            <input type="text" id="customNotes" placeholder="ဥပမာ - Bophut မီးပွိုင့်မှာဖမ်းနေတယ်..." autocomplete="off">
            <div style="display:flex; gap:10px;">
                <button class="btn-cancel" id="cancelBtn">ပယ်ဖျက်</button>
                <button class="btn-submit" id="submitBtn">အသိပေးမည်</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Firebase Config
            const firebaseConfig = {
                apiKey: "AIzaSyCcnC1Pr5-_tqW5rUKTKo",
                authDomain: "samui-live-e3000.firebaseapp.com",
                databaseURL: "https://samui-live-e3000-default-rtdb.firebaseio.com",
                projectId: "samui-live-e3000",
                storageBucket: "samui-live-e3000.firebasestorage.app",
                messagingSenderId: "943737508446",
                appId: "1:943737508446:web:298e8f05f69be8f940ae1e"
            };

            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            const reportsRef = database.ref('samui_live_reports');
            const chatRef = database.ref('chat_messages');

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
            }

            function removeOldData() {
                const now = Date.now();
                chatRef.orderByChild('timestamp').endAt(now - 3600000).once('value', s => s.forEach(c => c.ref.remove()));
                reportsRef.orderByChild('timestamp').endAt(now - 10800000).once('value', s => s.forEach(c => c.ref.remove()));
            }

            removeOldData();
            setInterval(removeOldData, 60000);

            const oneHourAgo = Date.now() - 3600000;
            const threeHoursAgo = Date.now() - 10800000;
            const activeChatsRef = chatRef.orderByChild('timestamp').startAt(oneHourAgo);
            const activeReportsRef = reportsRef.orderByChild('timestamp').startAt(threeHoursAgo);

            window.sendChat = () => {
                const inputField = document.getElementById('chatMsg');
                const msg = inputField.value.trim();
                if(msg !== "") {
                    chatRef.push({ text: msg, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), timestamp: Date.now() });
                    inputField.value = "";
                }
            };

            document.getElementById("chatMsg").addEventListener("keypress", function(event) {
                if (event.key === "Enter") { event.preventDefault(); window.sendChat(); }
            });

            activeChatsRef.on('child_added', (snapshot) => {
                const chat = snapshot.val();
                const div = document.getElementById('chat-messages');
                div.insertAdjacentHTML('beforeend', `<div id="chat-${snapshot.key}"><b>${chat.time}:</b> ${escapeHTML(chat.text)}</div>`);
                div.scrollTop = div.scrollHeight;
            });

            chatRef.on('child_removed', (snapshot) => {
                const messageDiv = document.getElementById(`chat-${snapshot.key}`);
                if (messageDiv) messageDiv.remove();
            });

            // --- Map Logic ---
            const satelliteMap = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { attribution: 'Google Satellite' });
            const standardMap = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { attribution: 'Google Standard' });

            const map = L.map('map', { tap: false, layers: [satelliteMap] }).setView([9.5343, 100.0611], 14);

            const baseMaps = { "ဂြိုလ်တုပုံ (Satellite)":satelliteMap , "ရိုးရိုးမြေပုံ (Standard)":standardMap  };
            L.control.layers(baseMaps).addTo(map);

            // --- My Location Button 🎯 ---
            const locateControl = L.control({position: 'bottomright'});
            locateControl.onAdd = function() {
                const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                div.style.backgroundColor = 'white';
                div.style.width = '38px';
                div.style.height = '38px';
                div.style.cursor = 'pointer';
                div.style.marginBottom = '50px';
                div.style.marginRight = '30px';
                div.style.display = 'flex';
                div.style.justifyContent = 'center';
                div.style.alignItems = 'center';
                div.style.fontSize = '22px';
                div.title = "ကျွန်ုပ်၏တည်နေရာ";
                div.innerHTML = '🎯'; // ဤနေရာတွင် ပုံပြောင်းနိုင်သည်
                div.onclick = function(e) {
                    e.stopPropagation();
                    map.locate({setView: true, maxZoom: 16}); // နှိပ်လျှင် GPS ရှာမည်
                }
                return div;
            };
            locateControl.addTo(map);

            let userLocationMarker;
            const blueDotIcon = L.divIcon({ className: 'blue-dot', iconSize: [16, 16], iconAnchor: [8, 8] });

            // GPS ရှာတွေ့လျှင် အပြာရောင်အစက်ချမည်
            map.on('locationfound', function(e) {
                if (userLocationMarker) {
                    userLocationMarker.setLatLng(e.latlng);
                } else {
                    userLocationMarker = L.marker(e.latlng, {icon: blueDotIcon}).addTo(map);
                    userLocationMarker.bindPopup("<b>သင်ဒီမှာရှိနေပါတယ်</b>");
                }
            });

            // GPS ရှာမရလျှင် (Location မဖွင့်ထားလျှင်)
            map.on('locationerror', function(e) {
                alert("သင့်တည်နေရာကို ရှာမရပါ။ ဖုန်း၏ GPS (Location) ဖွင့်ထားပါသလား စစ်ဆေးပေးပါ။");
            });

            // --- Marker Logic ---
            const allMarkersGroup = L.layerGroup().addTo(map);
            const liveIcon = L.divIcon({ html: '<div class="blink-inside">🚨</div>', className: 'live-marker-container', iconSize: [36, 36], iconAnchor: [18, 18] });
            const policeIcon = L.divIcon({ html: '<div style="font-size: 20px; background: white; border-radius: 50%; padding: 4px; box-shadow: 0 0 5px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; width: 32px; height: 32px;">👮‍♂️</div>', className: 'fixed-marker', iconSize: [32, 32], iconAnchor: [16, 16] });

            const fixedCheckpoints = [
                { lat: 9.528908, lng: 100.044942, name: "Chaweng ဝစ်စဝမ်ဘုန်းကြီးကျောင်းရှေ့" },
                { lat: 9.555964, lng: 100.031076, name: "Bophut Fisherman's' မီးပွိုင့်" },
                { lat: 9.520087, lng: 100.055004, name: "Chaweng မျောက်၂ကောင် Supercheap အနီးနား" },
                { lat: 9.534109, lng: 100.060589, name: "Chaweng ကန်ကြီး အဝိုင်းပတ်" }
            ];

            activeReportsRef.on('value', (snapshot) => {
                allMarkersGroup.clearLayers(); 
                const reportsData = snapshot.val() || {};
                const reportsByCoords = {};
                
                Object.keys(reportsData).forEach(key => {
                    const r = reportsData[key];
                    const coordKey = `${r.lat},${r.lng}`;
                    if(!reportsByCoords[coordKey]) reportsByCoords[coordKey] = [];
                    reportsByCoords[coordKey].push({ id: key, ...r });
                });

                fixedCheckpoints.forEach(point => {
                    const coordKey = `${point.lat},${point.lng}`;
                    const activeReportsHere = reportsByCoords[coordKey];

                    if (activeReportsHere && activeReportsHere.length > 0) {
                        const latestReport = activeReportsHere[activeReportsHere.length - 1]; 
                        const safeNotes = escapeHTML(latestReport.notes);
                        const marker = L.marker([point.lat, point.lng], { icon: liveIcon }).addTo(allMarkersGroup);
                        marker.bindPopup(`
                            <div style="text-align: center;">
                                <b style="color: red; font-size: 1.1rem;">${safeNotes}</b><br>
                                <small>အချိန်: ${latestReport.time}</small><br>
                                <small style="color: #2980b9; font-weight: bold;">(${point.name})</small><br>
                                <button class="delete-btn" onclick="removeReport('${latestReport.id}')">ဖျက်မည်</button>
                            </div>
                        `);
                        delete reportsByCoords[coordKey];
                    } else {
                        const marker = L.marker([point.lat, point.lng], { icon: policeIcon }).addTo(allMarkersGroup);
                        marker.bindPopup(`
                            <div style="text-align: center;">
                                <b style="color: #2980b9; font-size: 1.1rem;">${point.name}</b><br>
                                <small style="color: #666;">⚠️ ဆိုင်ကယ်ဖမ်းနေကျနေရာ</small><br>
                                <button class="report-now-btn" onclick="reportFixedPoint(${point.lat}, ${point.lng})">
                                    🚨 အခုဖမ်းနေတယ် သတင်းပို့မည်
                                </button>
                            </div>
                        `);
                    }
                });

                Object.values(reportsByCoords).forEach(reportArray => {
                    reportArray.forEach(r => {
                        const safeNotes = escapeHTML(r.notes);
                        const marker = L.marker([r.lat, r.lng], { icon: liveIcon }).addTo(allMarkersGroup);
                        marker.bindPopup(`
                            <div style="text-align: center;">
                                <b style="color: red; font-size: 1.1rem;">${safeNotes}</b><br>
                                <small>အချိန်: ${r.time}</small><br>
                                <button class="delete-btn" onclick="removeReport('${r.id}')">ဖျက်မည်</button>
                            </div>
                        `);
                    });
                });
            });

            window.removeReport = function(key) { reportsRef.child(key).remove(); };

            window.reportFixedPoint = function(lat, lng) {
                window.clickedCoords = { lat: lat, lng: lng };
                document.getElementById('reportModal').style.display = 'flex';
                document.getElementById('customNotes').focus();
                map.closePopup(); 
            };

            map.on('click', (e) => { 
                document.getElementById('reportModal').style.display = 'flex'; 
                window.clickedCoords = e.latlng; 
                document.getElementById('customNotes').focus(); 
            });

            document.getElementById('submitBtn').onclick = () => {
                const notesInput = document.getElementById('customNotes').value.trim();
                const notes = notesInput !== "" ? notesInput : "ရဲဖမ်းနေသည်"; 
                
                reportsRef.push({ 
                    lat: window.clickedCoords.lat, 
                    lng: window.clickedCoords.lng, 
                    notes: notes, 
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    timestamp: Date.now() 
                });
                
                document.getElementById('reportModal').style.display = 'none';
                document.getElementById('customNotes').value = "";
            };

            document.getElementById('cancelBtn').onclick = () => {
                document.getElementById('reportModal').style.display = 'none';
                document.getElementById('customNotes').value = "";
            };
        });
    </script>
</body>
</html>
