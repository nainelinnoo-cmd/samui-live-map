<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koh Samui Live Map</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #111; }
        header { background: #1a252f; color: #00ebff; padding: 15px; text-align: center; font-size: 1.1rem; font-weight: bold; z-index: 1000; }
        #map { flex: 1; width: 100%; z-index: 1; }
        
        @keyframes markerBlink {
            0% { background-color: #ffffff; box-shadow: 0 0 10px #e74c3c; transform: scale(1); }
            50% { background-color: #ffcccc; box-shadow: 0 0 25px #e74c3c, 0 0 15px #e74c3c; transform: scale(1.15); }
            100% { background-color: #ffffff; box-shadow: 0 0 10px #e74c3c; transform: scale(1); }
        }

        .blink-inside { width: 36px; height: 36px; border: 3px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; background-color: #ffffff; animation: markerBlink 1s infinite ease-in-out; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center; z-index: 99999; padding: 20px; }
        .modal-box { background: white; width: 100%; max-width: 340px; border-radius: 12px; padding: 20px; text-align: center; }
        .modal-box input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; margin-bottom: 15px; }
        .btn-submit { flex: 2; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn-cancel { flex: 1; padding: 12px; background: #95a5a6; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .delete-btn { padding: 4px 8px; background: #7f8c8d; color: white; border: none; border-radius: 3px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

    <header>🚨 Koh Samui Live Map</header>
    <div id="map"></div>

    <div class="modal-overlay" id="reportModal">
        <div class="modal-box">
            <h3>🚨 အခြေအနေ ရေးပေးပါ</h3>
            <input type="text" id="customNotes" placeholder="ဥပမာ - Bophut မီးပွိုင့်မှာဖမ်းနေတယ်..." autocomplete="off">
            <div style="display:flex; gap:10px;">
                <button class="btn-cancel" id="cancelBtn">ပယ်ဖျက်</button>
                <button class="btn-submit" id="submitBtn">အသိပေးမည်</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const firebaseConfig = {
                apiKey: "AIzaSyCcnC1Pr5-_tqW5rUKTKo",
                authDomain: "samui-live-e3000.firebaseapp.com",
                databaseURL: "https://samui-live-e3000-default-rtdb.firebaseio.com",
                projectId: "samui-live-e3000",
                storageBucket: "samui-live-e3000.firebasestorage.app",
                messagingSenderId: "943737508446",
                appId: "1:943737508446:web:298e8f05f69be8f940ae1e"
            };

            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            const reportsRef = database.ref('samui_live_reports');
            let isInitialLoad = true;

            const map = L.map('map', { tap: false }).setView([9.5343, 100.0611], 14);
            L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { attribution: 'Google' }).addTo(map);
            const liveIcon = L.divIcon({ html: '<div class="blink-inside">🚨</div>', className: 'live-marker-container', iconSize: [36, 36], iconAnchor: [18, 18] });

            function playAlertSound() {
                const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
                audio.play().catch(e => console.log("Sound play error"));
            }

            function sendNotification(msg) {
                if ("Notification" in window && Notification.permission === "granted") {
                    new Notification("Koh Samui Live Report", { body: msg });
                }
            }

            function updateAppBadge(count) {
                if ('setAppBadge' in navigator) {
                    if (count > 0) navigator.setAppBadge(count).catch(e => {});
                    else navigator.clearAppBadge().catch(e => {});
                }
            }

            reportsRef.on('child_added', (snapshot) => {
                if (!isInitialLoad) {
                    const data = snapshot.val();
                    sendNotification("Report အသစ်: " + data.notes);
                    playAlertSound();
                }
            });

            reportsRef.on('value', (snapshot) => {
                map.eachLayer(layer => { if (layer instanceof L.Marker) map.removeLayer(layer); });
                const data = snapshot.val();
                const count = data ? Object.keys(data).length : 0;
                updateAppBadge(count);

                if (data) {
                    Object.keys(data).forEach((key) => {
                        const r = data[key];
                        const marker = L.marker([r.lat, r.lng], { icon: liveIcon }).addTo(map);
                        // အနီရောင်စာသားအတွက် ပြင်ဆင်ထားသော Popup
                        marker.bindPopup(`
                            <div style="text-align: center;">
                                <b style="color: red; font-size: 1.1rem;">${r.notes}</b><br>
                                <small>အချိန်: ${r.time}</small><br>
                                <button class="delete-btn" onclick="removeReport('${key}')">ဖျက်မည်</button>
                            </div>
                        `);
                    });
                }
                isInitialLoad = false;
            });

            window.removeReport = function(key) { reportsRef.child(key).remove(); };

            map.on('click', (e) => { 
                document.getElementById('reportModal').style.display = 'flex'; 
                window.clickedCoords = e.latlng; 
            });

            document.getElementById('submitBtn').onclick = () => {
                const notes = document.getElementById('customNotes').value || "ရဲဖမ်းနေသည်";
                reportsRef.push({ lat: window.clickedCoords.lat, lng: window.clickedCoords.lng, notes: notes, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
                document.getElementById('reportModal').style.display = 'none';
                document.getElementById('customNotes').value = ""; // clear input
            };

            document.getElementById('cancelBtn').onclick = () => document.getElementById('reportModal').style.display = 'none';
        });
    </script>
</body>
</html>
